services:
  mongo:
    image: mongo:7
    container_name: xpress-code-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: xpress_code
    volumes:
      - mongo_data:/data/db

  # WhatsApp — sobe com `docker compose --profile whatsapp up -d`. Sem a flag
  # estes três serviços ficam parados e o app principal segue normal.
  evolution-postgres:
    image: postgres:15
    container_name: xpress-code-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD:-evolution}
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    profiles: ["whatsapp"]

  evolution-redis:
    image: redis:7-alpine
    container_name: xpress-code-evolution-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data
    profiles: ["whatsapp"]

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: xpress-code-evolution-api
    restart: unless-stopped
    depends_on:
      - evolution-postgres
      - evolution-redis
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-troque-este-valor-por-um-segredo-forte}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD:-evolution}@evolution-postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      LANGUAGE: pt-BR
      CONFIG_SESSION_PHONE_CLIENT: Xpress Code
    volumes:
      - evolution_instances:/evolution/instances
    profiles: ["whatsapp"]

volumes:
  mongo_data:
  evolution_postgres_data:
  evolution_redis_data:
  evolution_instances:
